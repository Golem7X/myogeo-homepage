<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · MYO_Geo_Orgs</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/assets/css/admin-login.css?v=20260705a" />
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <img src="/assets/logo.png" alt="MYO_Geo_Orgs" />
      <h1>MYO_Geo_Orgs <span>Admin Portal</span></h1>
    </div>

    <h2>🔐 Sign in</h2>
    <p class="sub">A 6-digit code will be sent to your Telegram bot. No password required.</p>

    <!-- Step bar -->
    <div class="steps">
      <div class="step active" id="step1"></div>
      <div class="step" id="step2"></div>
    </div>

    <!-- Step 1: Send code -->
    <div id="phase-send">
      <button class="send-btn" id="send-btn">
        <span class="tg-icon">✈️</span>
        Send code to Telegram
      </button>
      <p class="cooldown" id="cooldown"></p>
    </div>

    <!-- Step 2: Enter code (hidden until sent) -->
    <div id="phase-verify" class="hidden">
      <div class="divider"><span>Enter the code from Telegram</span></div>
      <label class="otp-label" for="otp">6-digit code</label>
      <input
        type="text" id="otp" class="otp-input"
        placeholder="• • • • • •"
        inputmode="numeric" pattern="\d{6}" maxlength="6"
        autocomplete="one-time-code"
      />
      <button class="verify-btn" id="verify-btn">Verify &amp; Sign in</button>
      <p class="cooldown link-row">
        Didn't get it? <a href="#" id="resend-link">Resend code</a>
      </p>
    </div>

    <p class="msg" id="msg"></p>
  </div>

  <script src="/assets/js/admin-login.js" defer></script>
</body>
</html>
